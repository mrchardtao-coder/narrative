<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>叙事</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 世界切换面板 -->
  <div id="worlds-overlay" class="overlay hidden">
    <div class="worlds-panel">
      <div class="worlds-header">
        <button id="worlds-close" class="btn-icon" aria-label="关闭">✕</button>
        <h2>切换世界</h2>
        <div class="header-spacer"></div>
      </div>
      <div id="worlds-list" class="worlds-list"></div>
      <div class="worlds-footer">
        <button id="btn-new-world" class="btn-primary">+ 新建世界</button>
      </div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>世界设定</h2>
        <button id="settings-close" class="btn-icon" aria-label="关闭">✕</button>
      </div>

      <label class="settings-label">世界名称</label>
      <input type="text" id="world-name" placeholder="给我的世界起个名字">

      <label class="settings-label">世界观</label>
      <textarea id="world-setting" placeholder="描述这个世界的基础设定：时代、地点、规则、氛围……
例如：一个赛博朋克风格的近未来都市，巨型企业控制着一切……"></textarea>

      <label class="settings-label">前情提要（选填）</label>
      <textarea id="prologue-setting" placeholder="故事开始前已经发生的事。AI 会从这里接着往下写。
例如：三天前你接到一桩失踪案，唯一的线索是一张模糊的全息照片。今晚你终于查到了照片的拍摄地点——旧城区第七街……"></textarea>

      <label class="settings-label">主角设定</label>
      <textarea id="character-setting" placeholder="描述主角的身份、性格、背景……
例如：你是一名退役的街头侦探，右臂是旧型号义体，欠着黑市医生一大笔钱……"></textarea>

      <label class="settings-label">主角姓名（聊天显示用）</label>
      <input type="text" id="protagonist-name" placeholder="主角的名字">

      <label class="settings-label">主角头像</label>
      <div class="avatar-upload-row">
        <div id="protagonist-avatar-preview" class="avatar-preview avatar-protagonist"></div>
        <button id="btn-protagonist-avatar" class="btn-outline btn-sm">选择图片</button>
      </div>
      <input type="file" id="protagonist-avatar-input" accept="image/*" class="hidden-input">

      <label class="settings-label">NPC 角色卡</label>
      <div class="npc-card-entry">
        <span id="npc-count" class="npc-count">暂无角色</span>
        <button id="btn-open-characters" class="btn-outline">管理角色卡 →</button>
      </div>

      <label class="settings-label">设定遵循度 <span id="attention-label" class="attention-value">5</span></label>
      <div class="attention-slider-row">
        <span class="attention-hint-left">自由</span>
        <input type="range" id="attention-slider" min="1" max="10" value="5" step="1">
        <span class="attention-hint-right">严格</span>
      </div>
      <p class="settings-hint">AI 对世界观和角色设定的专注程度。越高越严格遵循设定。</p>

      <label class="settings-label">DeepSeek API Key</label>
      <div class="api-key-row">
        <input type="password" id="deepseek-key" placeholder="sk-...">
        <button id="toggle-deepseek-key" class="btn-mini" tabindex="-1">👁</button>
      </div>

      <label class="settings-label">MIMO API Key</label>
      <div class="api-key-row">
        <input type="password" id="mimo-key" placeholder="mimo-...">
        <button id="toggle-mimo-key" class="btn-mini" tabindex="-1">👁</button>
      </div>

      <label class="settings-label">MIMO API 地址</label>
      <input type="text" id="mimo-endpoint" placeholder="https://api.xiaomimimo.com/v1/chat/completions">

      <div class="settings-actions">
        <button id="settings-save" class="btn-primary">保存并开始</button>
        <button id="settings-reset" class="btn-secondary">重置故事</button>
      </div>
    </div>
  </div>

  <!-- 角色卡管理面板 -->
  <div id="characters-overlay" class="overlay hidden">
    <div class="characters-panel">
      <div class="characters-header">
        <button id="characters-back" class="btn-back">← 返回设置</button>
        <h2>角色卡管理</h2>
        <div class="header-spacer"></div>
      </div>
      <div class="characters-search">
        <input type="text" id="characters-search-input" placeholder="搜索角色……" autocomplete="off">
      </div>
      <div id="characters-list" class="characters-list">
        <div class="characters-empty">还没有角色，点击下方按钮创建</div>
      </div>
      <div class="characters-footer">
        <button id="btn-new-character" class="btn-primary">+ 新建角色卡</button>
      </div>
    </div>
  </div>

  <!-- 角色卡编辑面板 -->
  <div id="character-edit-overlay" class="overlay hidden">
    <div class="character-edit-panel">
      <div class="edit-header">
        <button id="edit-back" class="btn-back">← 返回</button>
        <h2 id="edit-title">新建角色卡</h2>
        <button id="btn-delete-character" class="btn-icon btn-delete-char hidden" aria-label="删除">🗑</button>
      </div>
      <input type="hidden" id="edit-id">
      <label class="settings-label">姓名</label>
      <input type="text" id="edit-name" placeholder="角色姓名">
      <label class="settings-label">头像</label>
      <div class="avatar-upload-row">
        <div id="edit-avatar-preview" class="avatar-preview"></div>
        <button id="btn-edit-avatar" class="btn-outline btn-sm">选择图片</button>
      </div>
      <input type="file" id="edit-avatar-input" accept="image/*" class="hidden-input">
      <label class="settings-label">身份</label>
      <input type="text" id="edit-role" placeholder="身份 / 职业">
      <label class="settings-label">人设</label>
      <textarea id="edit-personality" placeholder="性格、背景、说话风格、特殊习惯……"></textarea>
      <label class="settings-label">与主角的关系（选填）</label>
      <input type="text" id="edit-relation" placeholder="例如：主角的线人、债主、旧友、宿敌……">
      <label class="settings-label">角色记忆 <span class="memory-badge">AI 自动维护</span></label>
      <textarea id="edit-memory" placeholder="AI 会根据剧情自动更新此角色的已知信息……&#10;你也可以手动修改。" class="memory-field"></textarea>
      <div class="memory-stats" id="memory-stats">0 tokens · 0 字符</div>
      <button id="btn-save-character" class="btn-primary">保存角色卡</button>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="app" class="app-container">

    <header class="top-bar">
      <button id="btn-switch-world" class="btn-world-switch" aria-label="切换世界">
        <span id="current-world-name">叙事</span>
        <span class="switch-arrow">▾</span>
      </button>
      <button id="open-settings" class="btn-icon" aria-label="设置">⚙</button>
    </header>

    <main id="story-area" class="story-area">
      <div id="story-content" class="story-content">
        <div class="welcome-message" id="welcome">
          <p class="welcome-icon">📖</p>
          <p>先设定你的世界，故事就会在这里展开。</p>
          <p class="welcome-hint">点击右上角 ⚙ 开始</p>
        </div>
      </div>
    </main>

    <footer class="input-bar">
      <button id="btn-image" class="btn-icon" aria-label="上传图片" title="上传图片">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="file" id="image-input" accept="image/*" class="hidden-input">
      <div class="input-wrapper">
        <textarea id="user-input" rows="1" placeholder="描述你的行动……" autocomplete="off"></textarea>
      </div>
      <button id="btn-send" class="btn-send" aria-label="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/prompt.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
