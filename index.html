<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script>
    // 一次性清理旧 Service Worker 缓存
    (function() {
      if (sessionStorage.getItem('_sw_clean')) return;
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          if (regs.length > 0) {
            return Promise.all(regs.map(r => r.unregister())).then(() => {
              sessionStorage.setItem('_sw_clean', '1');
              location.reload();
            });
          }
          sessionStorage.setItem('_sw_clean', '1');
        });
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.85em' font-size='80'>✍️</text></svg>">
  <title>叙事</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 世界切换 -->
<div id="worlds-overlay" class="overlay hidden">
  <div class="worlds-panel">
    <div class="worlds-header">
      <button id="worlds-close" class="btn-icon">✕</button>
      <h2>切换世界</h2>
      <div class="header-spacer"></div>
    </div>
    <div id="worlds-list" class="worlds-list"></div>
    <div class="worlds-footer"><button id="btn-new-world" class="btn-primary">+ 新建世界</button></div>
  </div>
</div>

<!-- 设置面板 -->
<div id="settings-overlay" class="overlay hidden">
  <div class="settings-panel">
    <div class="settings-header"><h2>世界设定</h2><button id="settings-close" class="btn-icon">✕</button></div>
    <label class="settings-label">世界名称</label>
    <input type="text" id="world-name" placeholder="给我的世界起个名字">
    <label class="settings-label">世界观</label>
    <textarea id="world-setting" placeholder="描述这个世界的基础设定……"></textarea>
    <label class="settings-label">前情提要</label>
    <textarea id="prologue-setting" placeholder="故事开始前已经发生的事……"></textarea>
    <label class="settings-label">主角设定</label>
    <textarea id="character-setting" placeholder="描述主角的身份、性格……"></textarea>
    <label class="settings-label">主角姓名</label>
    <input type="text" id="protagonist-name" placeholder="主角的名字">
    <label class="settings-label">主角头像</label>
    <div class="avatar-upload-row">
      <div id="protagonist-avatar-preview" class="avatar-preview avatar-protagonist"></div>
      <button id="btn-protagonist-avatar" class="btn-outline btn-sm">选择图片</button>
    </div>
    <input type="file" id="protagonist-avatar-input" accept="image/*" class="hidden-input">
    <label class="settings-label">主题</label>
    <div class="theme-selector">
      <button data-theme="dark" class="active">深色</button>
      <button data-theme="light">浅色</button>
      <button data-theme="system">跟随系统</button>
    </div>
    <label class="settings-label">NPC 角色卡</label>
    <div class="npc-card-entry">
      <span id="npc-count" class="npc-count">暂无角色</span>
      <button id="btn-open-characters" class="btn-outline">管理角色卡 →</button>
    </div>
    <label class="settings-label">设定遵循度 <span id="attention-label" class="attention-value">5</span></label>
    <div class="attention-slider-row">
      <span class="attention-hint-left">自由</span>
      <input type="range" id="attention-slider" min="1" max="10" value="5">
      <span class="attention-hint-right">严格</span>
    </div>
    <button id="btn-open-api" class="btn-primary" style="margin-top:12px">⚡ API 设置</button>
    <div class="settings-actions">
      <button id="settings-save" class="btn-primary">保存并开始</button>
      <button id="settings-reset" class="btn-secondary">重置故事</button>
      <button id="settings-refresh" class="btn-secondary" style="flex:0.5">刷新</button>
    </div>
  </div>
</div>

<!-- API 设置面板 -->
<div id="api-overlay" class="overlay hidden">
  <div class="settings-panel" style="max-width:480px">
    <div class="settings-header"><h2>API 设置</h2><button id="api-close" class="btn-icon">✕</button></div>
    <p class="settings-hint" style="margin-bottom:12px">至少配置一个模型提供者才能开始</p>
    <div id="api-providers-list"></div>
    <button id="btn-add-provider" class="btn-outline" style="width:100%;margin-bottom:14px">+ 添加模型提供者</button>

    <div class="model-assign-group">
      <label>🎬 导演</label>
      <select id="assign-director"></select>
    </div>
    <div class="model-assign-group">
      <label>👁 识图</label>
      <select id="assign-vision"></select>
    </div>
  </div>
</div>

<!-- 角色卡管理 -->
<div id="characters-overlay" class="overlay hidden">
  <div class="characters-panel">
    <div class="characters-header">
      <button id="characters-back" class="btn-back">← 返回设置</button>
      <h2>角色卡管理</h2><div class="header-spacer"></div>
    </div>
    <div class="characters-search"><input type="text" id="characters-search-input" placeholder="搜索角色……"></div>
    <div id="characters-list" class="characters-list"><div class="characters-empty">还没有角色</div></div>
    <div class="characters-footer"><button id="btn-new-character" class="btn-primary">+ 新建角色卡</button></div>
  </div>
</div>

<!-- 角色卡编辑 -->
<div id="character-edit-overlay" class="overlay hidden">
  <div class="character-edit-panel">
    <div class="edit-header">
      <button id="edit-back" class="btn-back">← 返回</button>
      <h2 id="edit-title">新建角色卡</h2>
      <button id="btn-delete-character" class="btn-icon btn-delete-char hidden">🗑</button>
    </div>
    <input type="hidden" id="edit-id">
    <label class="settings-label">姓名</label><input type="text" id="edit-name" placeholder="角色姓名">
    <label class="settings-label">头像</label>
    <div class="avatar-upload-row"><div id="edit-avatar-preview" class="avatar-preview"></div><button id="btn-edit-avatar" class="btn-outline btn-sm">选择图片</button></div>
    <input type="file" id="edit-avatar-input" accept="image/*" class="hidden-input">
    <label class="settings-label">身份</label>
    <textarea id="edit-role" placeholder="身份 / 职业" rows="2"></textarea>
    <label class="settings-label">人设</label>
    <textarea id="edit-personality" placeholder="性格、背景……" rows="4"></textarea>
    <label class="settings-label">与主角的关系</label>
    <textarea id="edit-relation" placeholder="例如：主角的师尊" rows="2"></textarea>
    <label class="settings-label" style="margin-top:10px">🤖 使用模型</label>
    <select id="edit-npc-model"><option value="">跟随全局设置</option></select>
    <label class="settings-label">角色记忆 <span class="memory-badge">AI 自动维护</span></label>
    <textarea id="edit-memory" placeholder="AI 会根据剧情自动更新……" class="memory-field"></textarea>
    <div class="memory-stats" id="memory-stats">0 tokens · 0 字符</div>
    <button id="btn-save-character" class="btn-primary">保存角色卡</button>
  </div>
</div>

<!-- 主界面 -->
<div id="app" class="app-container">
  <header class="top-bar">
    <button id="btn-switch-world" class="btn-world-switch"><span id="current-world-name">叙事</span><span class="switch-arrow">▾</span></button>
    <button id="open-settings" class="btn-icon">⚙</button>
  </header>
  <main id="story-area" class="story-area">
    <div id="branch-bar" class="branch-bar hidden"></div>
    <div id="story-content" class="story-content">
      <div class="welcome-message" id="welcome"><p class="welcome-icon">📖</p><p>先设定你的世界，故事就会在这里展开。</p><p class="welcome-hint">点击右上角 ⚙ 开始</p></div>
    </div>
  </main>
  <div class="disclaimer-bar">本软件仅为交互式叙事工具，AI 生成内容由用户自行负责。</div>
  <footer class="input-bar">
    <button id="btn-image" class="btn-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <input type="file" id="image-input" accept="image/*" class="hidden-input">
    <div class="input-wrapper"><textarea id="user-input" rows="1" placeholder="描述你的行动……"></textarea></div>
    <button id="btn-send" class="btn-send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </footer>
</div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/prompts.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/engine.js"></script>
<script src="js/default-world.js"></script>
<script src="js/app.js"></script>
</body>
</html>
